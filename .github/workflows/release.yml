name: Release
on:
  release:
    types: [published]
permissions:
  contents: read
  id-token: write # OIDC for npm Trusted Publishing (also enables automatic provenance)
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/* # current Active LTS (Node 24); avoids EOL versions
          registry-url: "https://registry.npmjs.org"
      - name: Ensure npm supports Trusted Publishing (>= 11.5.1)
        run: npm install -g npm@latest
      - name: Install deps (provides tsup for the prepublishOnly build hook)
        run: bun install --frozen-lockfile
      - name: Verify release tag matches package version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG="v$(node -p "require('./packages/starlight/package.json').version")"
          test "$TAG" = "$PKG" || { echo "release tag $TAG does not match package version $PKG"; exit 1; }
      - name: Publish to npm (Trusted Publishing / OIDC; provenance automatic, no token)
        run: npm publish
        working-directory: packages/starlight
